<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Agent — AI Task Runner</title>
<meta name="description" content="AI-powered browser automation agent with real-time task monitoring">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>
<style>
/* ── Reset ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #08090c;
  --surface:     #111318;
  --surface2:    #191c22;
  --surface3:    #1f232b;
  --border:      #262c38;
  --border2:     #2e3647;
  --accent:      #6c8dfa;
  --accent-g:    linear-gradient(135deg, #6c8dfa 0%, #5ce0d8 100%);
  --accent-glow: rgba(108, 141, 250, 0.15);
  --green:       #34d399;
  --green-dim:   rgba(52, 211, 153, 0.12);
  --amber:       #fbbf24;
  --red:         #f87171;
  --red-dim:     rgba(248, 113, 113, 0.12);
  --text:        #e2e8f0;
  --text2:       #94a3b8;
  --text3:       #64748b;
  --mono:        'JetBrains Mono', 'Fira Code', monospace;
  --sans:        'Inter', system-ui, -apple-system, sans-serif;
  --radius:      12px;
  --radius-sm:   8px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --transition:  0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  display: flex;
  flex-direction: column;
}

/* ── Topbar ──────────────────────────────────────────────────── */
.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.04em;
  color: var(--text);
  white-space: nowrap;
}

.logo-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--accent-g);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.logo-text span {
  background: var(--accent-g);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.topbar-spacer { flex: 1; }

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 14px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--surface2);
  transition: all var(--transition);
}

.status-pill .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text3);
  transition: all var(--transition);
}

.status-pill[data-status="running"] {
  border-color: rgba(52, 211, 153, 0.3);
  background: var(--green-dim);
  color: var(--green);
}
.status-pill[data-status="running"] .dot {
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.5s ease-in-out infinite;
}

.status-pill[data-status="done"] {
  border-color: rgba(108, 141, 250, 0.3);
  background: var(--accent-glow);
  color: var(--accent);
}
.status-pill[data-status="done"] .dot { background: var(--accent); }

.status-pill[data-status="error"] {
  border-color: rgba(248, 113, 113, 0.3);
  background: var(--red-dim);
  color: var(--red);
}
.status-pill[data-status="error"] .dot { background: var(--red); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.step-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}

/* ── Main Content ────────────────────────────────────────────── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Hero / Task Input ───────────────────────────────────────── */
.hero {
  padding: 56px 24px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  flex-shrink: 0;
  background: radial-gradient(ellipse 800px 400px at 50% 0%, rgba(108,141,250,0.06) 0%, transparent 70%);
}

.hero h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.hero h1 span {
  background: var(--accent-g);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  color: var(--text3);
  font-size: 15px;
  margin-bottom: 32px;
  max-width: 460px;
  line-height: 1.6;
}

.input-group {
  width: 100%;
  max-width: 680px;
  position: relative;
}

.task-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  padding: 16px 140px 16px 20px;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  line-height: 1.5;
}
.task-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.task-input::placeholder { color: var(--text3); }

.input-actions {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
}

.btn {
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 13px;
  padding: 10px 20px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

.btn-primary {
  background: var(--accent-g);
  color: #0a0c10;
}
.btn-primary:hover:not(:disabled) {
  box-shadow: 0 4px 16px rgba(108,141,250,0.35);
}

.btn-danger {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.2);
}
.btn-danger:hover:not(:disabled) {
  background: rgba(248,113,113,0.18);
}


.lottie-hidden { display: none !important; }

/* ── Input Row (input + blob side-by-side) ──────────────────── */
.input-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 680px;
}

/* ── Agent Blob (Siri-style) ───────────────────────────────── */
.blob-wrapper {
  width: 0;
  height: 0;
  opacity: 0;
  transform: scale(0);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  flex-shrink: 0;
  overflow: hidden;
  border-radius: 50%;
}

.blob-wrapper:not(.lottie-hidden) {
  width: 160px;
  height: 80px;
  opacity: 1;
  transform: scale(1);
  animation: blobPulse 2s ease-in-out infinite;
}

.blob-wrapper dotlottie-wc {
  width: 100% !important;
  height: 100% !important;
  display: block;
  animation: blobRotate 6s linear infinite;
}

@keyframes blobPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

@keyframes blobRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ── Progress Bar ────────────────────────────────────────────── */
.progress-track {
  width: 100%;
  max-width: 680px;
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 20px;
  opacity: 0;
  transition: opacity var(--transition);
}
.progress-track.visible { opacity: 1; }

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--accent-g);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-fill.indeterminate {
  width: 30%;
  animation: progressSlide 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}
@keyframes progressSlide {
  0%   { margin-left: 0; }
  50%  { margin-left: 70%; }
  100% { margin-left: 0; }
}

/* ── Event Feed ──────────────────────────────────────────────── */
.feed-container {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 0 24px 24px;
}

.feed-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  flex-shrink: 0;
}

.feed-header h2 {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text3);
}

.feed-header .count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
}

.feed {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-bottom: 16px;
}

.feed-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  display: flex;
  gap: 14px;
  animation: cardIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  transition: border-color var(--transition);
}
.feed-card:hover {
  border-color: var(--border2);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.card-icon.step    { background: rgba(108,141,250,0.12); color: var(--accent); }
.card-icon.running { background: var(--green-dim); color: var(--green); }
.card-icon.done    { background: rgba(108,141,250,0.12); color: var(--accent); }
.card-icon.error   { background: var(--red-dim); color: var(--red); }
.card-icon.stopped { background: rgba(251,191,36,0.12); color: var(--amber); }

.card-body { flex: 1; min-width: 0; }

.card-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title .time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  font-weight: 400;
}

.card-detail {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  font-family: var(--mono);
  word-break: break-word;
}

.card-url {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 4px;
}

/* result card */
.feed-card.result-card {
  border-color: rgba(108,141,250,0.25);
  background: linear-gradient(135deg, rgba(108,141,250,0.04) 0%, rgba(92,224,216,0.04) 100%);
}
.feed-card.result-card .card-detail {
  color: var(--text);
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
}

.feed-card.error-card {
  border-color: rgba(248,113,113,0.25);
  background: rgba(248,113,113,0.03);
}
.feed-card.error-card .card-detail {
  color: var(--red);
}

/* ── Empty State ─────────────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  text-align: center;
  color: var(--text3);
  gap: 16px;
}

.empty-icon {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  opacity: 0.5;
}

.empty-state p {
  font-size: 13px;
  max-width: 320px;
  line-height: 1.6;
}

/* ── Toast ────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 20px;
  font-size: 13px;
  font-family: var(--mono);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.3s, transform 0.3s;
  z-index: 200;
  max-width: 400px;
  pointer-events: none;
  box-shadow: var(--shadow);
}
#toast.show  { opacity: 1; transform: none; }
#toast.ok    { border-color: rgba(52,211,153,0.4); color: var(--green); }
#toast.err   { border-color: rgba(248,113,113,0.4); color: var(--red); }
 
/* ── Result Panel ───────────────────────────────────────────── */
#result-panel {
  display: none;
  width: 100%;
  max-width: 680px;
  background: var(--surface2);
  border: 1px solid rgba(108, 141, 250, 0.4);
  border-radius: var(--radius);
  margin: 0 auto 24px;
  padding: 20px;
  animation: cardIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  text-align: left;
}
#result-panel.visible { display: block; }
 
.result-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  color: var(--accent);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
 
.result-content {
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  background: var(--surface);
  padding: 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  max-height: 400px;
  overflow-y: auto;
}

/* ── Scrollbar ────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }

/* ── Responsive ───────────────────────────────────────────────── */
@media (max-width: 640px) {
  .hero { padding: 32px 16px 24px; }
  .hero h1 { font-size: 22px; }
  .task-input { padding-right: 16px; font-size: 14px; }
  .input-actions { position: static; transform: none; margin-top: 10px; width: 100%; }
  .input-group { display: flex; flex-direction: column; }
  .btn { flex: 1; justify-content: center; }
  .feed-container { padding: 0 16px 16px; }
}
</style>
</head>
<body>

<!-- ── Topbar ──────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="logo">
    <div class="logo-icon">🔮</div>
    <div class="logo-text"><span>browser</span>agent</div>
  </div>
  <div class="topbar-spacer"></div>
  <div class="step-badge" id="step-badge">—</div>
  <div class="status-pill" id="status-pill" data-status="idle">
    <div class="dot"></div>
    <span id="status-text">idle</span>
  </div>
</header>

<!-- ── Main Content ───────────────────────────────────────────── -->
<div class="content">

  <!-- Hero / Task Input -->
  <section class="hero">
    <h1>Automate with <span>AI Agent</span></h1>
    <p>Describe what you want the browser agent to do. It will use AI to plan and execute complex browser tasks autonomously.</p>

    <div class="input-row">
      <div class="input-group">
        <input id="task-input" class="task-input" type="text"
          placeholder="e.g. Go to google.com and search for 'AI browser automation'…">
        <div class="input-actions">
          <button class="btn btn-danger" id="stop-btn" disabled>
            <span>■</span> Stop
          </button>
          <button class="btn btn-primary" id="run-btn">
            <span>▶</span> Run
          </button>
        </div>
      </div>

      <div class="blob-wrapper lottie-hidden" id="agent-lottie-wrapper">
        <dotlottie-wc id="agent-lottie"
          src="https://lottie.host/96b6a912-f86d-4f4f-8a6f-78fa26f5da4f/99DGN3Knzs.lottie"
          autoplay loop>
        </dotlottie-wc>
      </div>
    </div>

    <div class="progress-track" id="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
 
    <!-- Result Panel -->
    <div id="result-panel">
      <div class="result-header">
        <span>✨</span> Final Result
      </div>
      <div id="result-content" class="result-content"></div>
    </div>
  </section>

  <!-- Event Feed -->
  <div class="feed-container" id="feed-container">
    <div class="feed-header" id="feed-header" style="display:none">
      <h2>Activity Log</h2>
      <span class="count" id="event-count">0</span>
    </div>
    <div class="feed" id="feed">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🤖</div>
        <p>No tasks running yet. Type a task above and hit <strong>Run</strong> to start the AI agent.</p>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────
const BACKEND = window.location.origin;

// ── State ─────────────────────────────────────────────────────────
let isRunning   = false;
let stepCount   = 0;
let maxSteps    = 50;
let eventCount  = 0;
let evtSource   = null;

// ── DOM ───────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const runBtn       = $('run-btn');
const stopBtn      = $('stop-btn');
const taskInput    = $('task-input');
const statusPill   = $('status-pill');
const statusText   = $('status-text');
const stepBadge    = $('step-badge');
const progressTrack = $('progress-track');
const progressFill = $('progress-fill');
const feed         = $('feed');
const feedHeader   = $('feed-header');
const eventCounter = $('event-count');
const emptyState   = $('empty-state');
const resultPanel  = $('result-panel');
const resultContent = $('result-content');
const agentLottie  = $('agent-lottie-wrapper');

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 4000);
}

// ── Status helpers ────────────────────────────────────────────────
function setStatus(s) {
  statusPill.dataset.status = s;
  statusText.textContent = s;
}

function setRunning(running) {
  isRunning = running;
  runBtn.disabled = running;
  stopBtn.disabled = !running;
  taskInput.disabled = running;
  agentLottie.classList.toggle('lottie-hidden', !running);

  if (running) {
    progressTrack.classList.add('visible');
    progressFill.classList.add('indeterminate');
    progressFill.style.width = '';
    resultPanel.classList.remove('visible'); // Reset panel on new run
  } else {
    progressFill.classList.remove('indeterminate');
  }
}

function updateProgress() {
  if (maxSteps > 0 && isRunning) {
    const pct = Math.min((stepCount / maxSteps) * 100, 100);
    progressFill.style.width = pct + '%';
    progressFill.classList.remove('indeterminate');
  }
  stepBadge.textContent = `Step ${stepCount} / ${maxSteps}`;
}

// ── Feed helpers ──────────────────────────────────────────────────
function addFeedCard(iconClass, icon, title, detail, extra) {
  if (emptyState) emptyState.style.display = 'none';
  feedHeader.style.display = 'flex';
  eventCount++;
  eventCounter.textContent = eventCount;

  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

  const card = document.createElement('div');
  card.className = 'feed-card';
  if (iconClass === 'done') card.classList.add('result-card');
  if (iconClass === 'error') card.classList.add('error-card');

  card.innerHTML = `
    <div class="card-icon ${iconClass}">${icon}</div>
    <div class="card-body">
      <div class="card-title">${title} <span class="time">${time}</span></div>
      ${detail ? `<div class="card-detail">${escHtml(detail)}</div>` : ''}
      ${extra ? `<div class="card-url">${escHtml(extra)}</div>` : ''}
    </div>
  `;

  feed.appendChild(card);
  feed.scrollTop = feed.scrollHeight;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatAction(action) {
  if (!action) return 'action';
  if (typeof action === 'string') return action;
  // Try to find the action type from browser-use output
  const keys = Object.keys(action);
  for (const k of keys) {
    if (action[k] && typeof action[k] === 'object' || typeof action[k] === 'string') {
      return k;
    }
  }
  return JSON.stringify(action).slice(0, 100);
}

function formatActionDetail(action) {
  if (!action) return '';
  if (typeof action === 'string') return action;
  const parts = [];
  const walk = (obj) => {
    for (const [k, v] of Object.entries(obj)) {
      if (typeof v === 'string' && v.length > 0) {
        // Remove the .slice(0, 120) truncation to show full text
        parts.push(`${k}: ${v}`);
      }
      else if (typeof v === 'number') parts.push(`${k}: ${v}`);
      else if (typeof v === 'object' && v !== null) walk(v);
    }
  };
  walk(action);
  return parts.join(' · ');
}

// ── SSE Connection ────────────────────────────────────────────────
function connectSSE() {
  if (evtSource) {
    try { evtSource.close(); } catch(e){}
  }

  evtSource = new EventSource(BACKEND + '/api/stream');

  evtSource.onmessage = (e) => {
    if (!e.data) return;
    try {
      handleEvent(JSON.parse(e.data));
    } catch(err) {}
  };

  evtSource.onerror = () => {
    evtSource.close();
    setTimeout(connectSSE, 3000);
  };
}

function handleEvent(ev) {
  switch (ev.type) {

    case 'status':
      if (ev.status === 'running') {
        stepCount = 0;
        maxSteps = ev.max_steps || 50;
        setStatus('running');
        setRunning(true);
        addFeedCard('running', '🚀', 'Task started', ev.task || '', '');
        toast('Agent is running…');
      } else if (ev.status === 'done') {
        setStatus('done');
        setRunning(false);
        progressFill.style.width = '100%';
        
        const res = ev.result || 'No result returned';
        addFeedCard('done', '✅', 'Task completed', res, '');
        
        // Populate and show the result panel
        resultContent.textContent = res;
        resultPanel.classList.add('visible');
        
        toast('Task completed ✓');
      } else if (ev.status === 'stopped') {
        setStatus('idle');
        setRunning(false);
        addFeedCard('stopped', '⏸', 'Task stopped', 'Stopped by user', '');
        toast('Agent stopped');
      } else if (ev.status === 'error') {
        setStatus('error');
        setRunning(false);
        addFeedCard('error', '❌', 'Error', ev.error || 'Unknown error', ev.trace || '');
        toast('Error: ' + (ev.error || 'unknown'), 'err');
      }
      break;

    case 'step':
      stepCount = ev.step || stepCount + 1;
      updateProgress();
      const actionName = formatAction(ev.action);
      const actionDetail = formatActionDetail(ev.action);
      addFeedCard('step', '⚡', `Step #${ev.step} — ${escHtml(actionName)}`, actionDetail, ev.url || '');
      break;

    case 'connected':
      console.log('SSE connected, agent_status:', ev.agent_status);
      break;

    case 'ping':
      break;
  }
}

// ── Run / Stop ────────────────────────────────────────────────────
runBtn.onclick = async () => {
  const task = taskInput.value.trim();
  if (!task) {
    toast('Enter a task description first', 'err');
    taskInput.focus();
    return;
  }

  try {
    const r = await fetch(BACKEND + '/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, max_steps: maxSteps }),
    });
    const data = await r.json();
    if (data.error) {
      toast(data.error, 'err');
    }
  } catch (e) {
    toast('Cannot reach backend: ' + e.message, 'err');
  }
};

stopBtn.onclick = async () => {
  try {
    await fetch(BACKEND + '/api/stop', { method: 'POST' });
  } catch (e) {
    toast('Stop failed: ' + e.message, 'err');
  }
};

// Enter key to run
taskInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !isRunning) {
    runBtn.click();
  }
});

// ── Init ──────────────────────────────────────────────────────────
connectSSE();
</script>
